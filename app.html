<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><g fill="none" stroke="%2366715F" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"><path d="M50 22V80"/><path d="M34 42H66"/><path d="M50 60C60 60 66 54 66 44 56 44 50 50 50 60Z"/></g></svg>' />
<title>Grace Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --background:#F7F3EA;--surface:#FFFDF8;--surface-muted:#F1EBDF;
  --primary:#7EA46F;--primary-hover:#658F56;--primary-pressed:#426D35;--primary-light:#DDE4D9;
  --secondary:#9BA895;--accent:#C98F72;
  --text-primary:#403A34;--text-secondary:#6F6861;--text-muted:#9A9187;
  --border:#DDD5C9;--divider:#E7E0D4;--success:#6F8A68;--error:#A76C65;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#e9e3d6;color:var(--text-primary);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
body{display:flex;justify-content:center;min-height:100vh}
.app{width:100%;max-width:440px;background:var(--background);min-height:100vh;position:relative;display:flex;flex-direction:column}
.screen{flex:1;padding:24px 20px 96px;display:none;animation:fade .28s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
h1,.serif{font-family:'Fraunces',serif}
.wordmark{font-family:'Fraunces',serif;font-weight:600;font-size:21px;color:var(--primary-hover);margin-bottom:8px}
.h1{font-family:'Fraunces',serif;font-weight:600;font-size:27px;line-height:33px;margin-bottom:8px}
.h2{font-family:'Fraunces',serif;font-weight:600;font-size:21px;line-height:27px}
.sub{color:var(--text-secondary);font-size:15px;line-height:22px}
.label{font-size:12px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--text-muted)}
.section-t{font-family:'Fraunces',serif;font-weight:600;font-size:18px;margin:22px 0 12px}
.card{background:var(--surface);border-radius:16px;padding:20px;box-shadow:0 4px 12px rgba(64,58,52,.08);margin-bottom:16px;position:relative;overflow:hidden}
.verse{font-family:'Fraunces',serif;font-style:italic;font-size:20px;line-height:32px;border-left:2px solid var(--secondary);padding-left:14px;margin:8px 0}
.divider{height:1px;background:var(--divider);margin:14px 0}
.key{font-size:15px;color:var(--text-secondary);line-height:22px}
.prayer{font-size:16px;line-height:26px}
textarea,input{font:inherit;color:var(--text-primary)}
textarea{width:100%;min-height:84px;border:1px solid var(--border);background:var(--surface);border-radius:10px;padding:12px;font-size:15px;resize:vertical}
input[type=email],input[type=text]{width:100%;height:52px;border:1px solid var(--border);background:var(--surface);border-radius:10px;padding:0 14px;font-size:15px}
input:focus,textarea:focus{outline:none;border-color:var(--primary-hover);box-shadow:0 0 0 3px rgba(101,143,86,.16)}
.btn{width:100%;height:52px;border:none;border-radius:12px;font:inherit;font-weight:600;font-size:16px;cursor:pointer;transition:.15s}
.btn-primary{background:var(--primary);color:#FFFDF8}
.btn-primary:hover{background:var(--primary-hover)}.btn-primary:active{background:var(--primary-pressed)}
.btn-primary:disabled{background:#ECE6DB;color:#B5AEA3;cursor:not-allowed}
.btn-sec{background:transparent;border:1px solid var(--secondary);color:var(--text-primary)}
.btn-text{background:none;border:none;color:var(--primary-hover);font-weight:600;font-size:15px;cursor:pointer;padding:10px;width:100%}
.chiprow{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.chip{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);border-radius:999px;padding:9px 14px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;flex:0 0 auto;transition:.15s}
.chip svg{width:18px;height:18px;stroke:#8B857D;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.chip.sel{background:var(--primary-light);border-color:var(--primary-hover);color:var(--text-primary)}
.chip.sel svg{stroke:#596653}
.mood-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mood-chip{display:flex;align-items:center;gap:12px;height:52px;padding:0 16px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--text-secondary);font-size:15px;font-weight:500;cursor:pointer;transition:.15s}
.mood-chip svg{width:20px;height:20px;stroke:#8B857D;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto}
.mood-chip.sel{background:var(--primary-light);border-color:var(--primary-hover);color:var(--text-primary)}
.mood-chip.sel svg{stroke:#596653}
.header-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:4px}
.streak{display:inline-flex;align-items:center;gap:6px;background:var(--surface-muted);border-radius:999px;padding:6px 12px;font-size:14px;font-weight:600;color:var(--primary-hover)}
.act{display:flex;align-items:flex-start;gap:12px;cursor:pointer}
.act .box{width:24px;height:24px;border:2px solid var(--secondary);border-radius:7px;flex:0 0 auto;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:.15s}
.act.done .box{background:var(--success);border-color:var(--success)}
.act .box svg{width:15px;height:15px;stroke:#fff;stroke-width:3;fill:none;opacity:0}.act.done .box svg{opacity:1}
.leaves{display:flex;gap:8px;margin:14px 0;flex-wrap:wrap}
.leaves .lf{width:26px;height:26px;color:var(--border)}
.leaves .lf.on{color:var(--success)}.leaves .lf.today{color:var(--primary-hover)}
.nav{position:sticky;bottom:0;left:0;right:0;height:64px;background:var(--surface);border-top:1px solid var(--divider);display:flex;justify-content:space-around;align-items:center;max-width:440px;margin:0 auto;width:100%}
.nav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;color:var(--text-muted);cursor:pointer}
.nav button.on{color:var(--primary-hover)}
.nav svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--text-secondary)}
.dot{width:8px;height:8px;border-radius:99px;display:inline-block}
.pr-card{display:block;width:100%;text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;cursor:pointer;font:inherit}
.center{text-align:center}
.spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px}
@keyframes sp{to{transform:rotate(360deg)}}
.hero{width:140px;height:140px;margin:20px auto 6px;display:block;color:var(--secondary)}
.step-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.progress-dots{display:flex;gap:6px}.progress-dots i{width:8px;height:8px;border-radius:99px;background:var(--border)}.progress-dots i.on{background:var(--primary-hover)}
.back{background:none;border:none;font-size:24px;color:var(--text-secondary);cursor:pointer;line-height:1}
.select{width:100%;height:48px;border:1px solid var(--border);border-radius:10px;background:var(--surface);padding:0 12px;font:inherit;font-size:15px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text-primary);color:#fff;padding:10px 16px;border-radius:12px;font-size:13px;z-index:50;box-shadow:0 6px 18px rgba(0,0,0,.2)}
.reflect-q{font-family:'Fraunces',serif;font-size:20px;line-height:28px;margin-bottom:12px}
.small{font-size:13px;color:var(--text-muted)}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- AUTH -->
  <section class="screen active" id="s-auth">
    <div style="padding-top:40px"></div>
    <div class="wordmark">Grace Companion</div>
    <div class="h1">Three quiet minutes with God — every day.</div>
    <div class="sub">Sign in with your email — no password. We'll send you a magic link.</div>
    <div style="margin-top:22px">
      <input type="email" id="auth-email" placeholder="your@email.com" />
      <button class="btn btn-primary" id="auth-btn" style="margin-top:10px">Send my magic link</button>
      <div class="small center" id="auth-msg" style="margin-top:12px"></div>
    </div>
  </section>

  <!-- ONBOARDING -->
  <section class="screen" id="s-onb">
    <svg class="hero" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 22c-6-3-9-7-9-12a9 9 0 0 1 18 0c0 5-3 9-9 12Z"/><path d="M12 22V9M12 12c0-3 2-4 5-4M12 15c0-3-2-4-5-4"/></svg>
    <div class="h1 center">A quiet place to return to.</div>
    <div class="sub center" style="margin:6px 6px 20px">What should we call you?</div>
    <input type="text" id="onb-name" placeholder="Sarah" />
    <button class="btn btn-primary" style="margin-top:16px" id="onb-btn">Begin today</button>
  </section>

  <!-- TODAY -->
  <section class="screen" id="s-today"></section>
  <!-- MOMENT (step) -->
  <section class="screen" id="s-moment"></section>
  <!-- JOURNEY -->
  <section class="screen" id="s-journey"></section>
  <!-- GRATITUDE -->
  <section class="screen" id="s-grat"></section>
  <!-- CHALLENGE -->
  <section class="screen" id="s-chal"></section>

  <nav class="nav" id="nav" style="display:none">
    <button class="on" data-t="today" onclick="nav('today')"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>Today</button>
    <button data-t="journey" onclick="nav('journey')"><svg viewBox="0 0 24 24"><path d="M12 21s-7-4.5-7-10a7 7 0 0 1 14 0c0 5.5-7 10-7 10Z"/></svg>Prayers</button>
    <button data-t="grat" onclick="nav('grat')"><svg viewBox="0 0 24 24"><path d="M12 21c-3-4-3-8 0-12 3 4 3 8 0 12Z"/></svg>Gratitude</button>
    <button data-t="chal" onclick="nav('chal')"><svg viewBox="0 0 24 24"><path d="M12 3v18M5 8c3 0 7 1 7 5M19 8c-3 0-7 1-7 5"/></svg>Peace</button>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://vsdoupsuromxcggpommb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_4oT9Wwo9BHJcst9FqLAc8g_hHjZ0vi7';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ---------- content ----------
const leafIcons = {
  Anxious:'<path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 1.3 0 1.9-.5 2.5-1"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 1.3 0 1.9-.5 2.5-1"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 1.3 0 1.9-.5 2.5-1"/>',
  Grateful:'<path d="M12 5a3 3 0 1 1 3 3m-3-3a3 3 0 1 0-3 3m3-3v1"/><circle cx="12" cy="8" r="2"/><path d="M12 10v10"/><path d="M12 20c3.3 0 5.5-1.3 5.5-4-3.3 0-5.5 1.3-5.5 4Z"/><path d="M12 20c-3.3 0-5.5-1.3-5.5-4 3.3 0 5.5 1.3 5.5 4Z"/>',
  Tired:'<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>',
  Lonely:'<circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 0 0-16 0"/>',
  Hopeful:'<path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8Z"/>',
  Overwhelmed:'<path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/>'
};
const moods = {
  Anxious:{ref:'Philippians 4:6–7',text:'In nothing be anxious, but in everything, by prayer and petition with thanksgiving, let your requests be made known to God.',key:'You can bring the thing you\'re carrying to God — today, in plain words.',prayer:'"Lord, here is what\'s weighing on me today. I don\'t have it figured out, but I bring it to You."',q:'What is one worry you could hand over right now?',act:'Take three slow breaths and name one thing you\'ll trust God with today.'},
  Tired:{ref:'Matthew 11:28',text:'Come to me, all you who labor and are heavily burdened, and I will give you rest.',key:'Rest is an invitation, not a reward you earn.',prayer:'"Lord, I\'m tired. Thank You that I don\'t have to carry today alone. Meet me here."',q:'Where do you most need rest today — body, mind, or heart?',act:'Give yourself permission to do one thing slowly today.'},
  Lonely:{ref:'Psalm 34:18',text:'The LORD is near to those who have a broken heart, and saves those who have a crushed spirit.',key:'Nearness, not distance, is God\'s posture toward you.',prayer:'"Lord, I feel alone right now. Would You remind me, quietly, that You are near?"',q:'When did you last feel truly seen?',act:'Send a short, honest message to one person you trust.'},
  Grateful:{ref:'1 Thessalonians 5:16–18',text:'Rejoice always. Pray without ceasing. In everything give thanks, for this is the will of God in Christ Jesus toward you.',key:'Gratitude turns ordinary moments into worship.',prayer:'"Thank You, Lord — for this, and for the small things I usually rush past."',q:'What is one small thing you\'re grateful for right now?',act:'Tell one person specifically why you\'re thankful for them.'},
  Hopeful:{ref:'Jeremiah 29:11',text:'For I know the thoughts that I think toward you, says the LORD, thoughts of peace, and not of evil, to give you hope and a future.',key:'Hope is trust with a direction.',prayer:'"Lord, thank You for the hope stirring in me. Help me take one faithful step."',q:'What hope can you hold gently before God today?',act:'Write down one small step toward something you\'re hoping for.'},
  Overwhelmed:{ref:'Psalm 61:2',text:'When my heart is overwhelmed, lead me to the rock that is higher than I.',key:'You don\'t have to steady yourself. You can be led.',prayer:'"Lord, it\'s a lot right now. Lead me to steadier ground — one step is enough."',q:'If you could set down one thing today, what would it be?',act:'Choose the single most important task for today and let the rest wait.'}
};
const moodList = Object.keys(moods);
const peace = [
  {theme:'Bring it to God',ref:'Philippians 4:6–7',prayer:'"Lord, I bring what weighs on me to You."',q:'What is one worry you can hand over today?',act:'Name one thing you\'ll trust God with.'},
  {theme:'Cast your care',ref:'1 Peter 5:7',prayer:'"Lord, I hand this to You, piece by piece."',q:'What could you set down with God today?',act:'Write it down; beside it write "God cares about this."'},
  {theme:'Rest for the weary',ref:'Matthew 11:28',prayer:'"Lord, meet me in this quiet. I\'m tired."',q:'Where do you need rest today?',act:'Do one thing slowly today.'},
  {theme:'You are not alone',ref:'Deuteronomy 31:8',prayer:'"Lord, remind me You go before me."',q:'Where do you need God\'s nearness today?',act:'Reach out to one person you trust.'},
  {theme:'A quiet hope',ref:'Psalm 42:11',prayer:'"Lord, I place my hope in You."',q:'What small hope can you hold before God?',act:'Say a one-line prayer over one hope.'},
  {theme:'Trust for tomorrow',ref:'Matthew 6:34',prayer:'"Lord, I give tomorrow to You."',q:'What worry about tomorrow can you release today?',act:'Pick today\'s one most important thing; let the rest wait.'},
  {theme:'Peace that stays',ref:'John 14:27',prayer:'"Lord, let Your peace stay with me."',q:'Where did you notice a little more peace this week?',act:'Keep the rhythm: one verse, one prayer tomorrow.'}
];

// ---------- state ----------
let USER=null, PROFILE=null, STREAK={current:0,longest:0,last_date:null};
let todayMood=null, todayCompleted=false, momentStep=0, momentMood=null, chal={current_day:0,completed_days:[]};
const todayStr = ()=> new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD local

function leafSVG(cls){return `<svg class="lf ${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c-5 4-7 7-7 10a7 7 0 0 0 14 0c0-3-2-6-7-10Z"/><path d="M12 21V8"/></svg>`;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('s-'+id).classList.add('active');}
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),1900);}

// ---------- auth ----------
document.getElementById('auth-btn').onclick = async ()=>{
  const email=document.getElementById('auth-email').value.trim();
  if(!/.+@.+\..+/.test(email)){document.getElementById('auth-msg').textContent='Please enter a valid email.';return;}
  const btn=document.getElementById('auth-btn'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:location.origin+location.pathname}});
  btn.disabled=false; btn.textContent='Send my magic link';
  document.getElementById('auth-msg').textContent = error ? ('Error: '+error.message) : 'Check your inbox 🌿 Tap the link to sign in.';
};

sb.auth.onAuthStateChange((_e,session)=>{ if(session&&!USER){ USER=session.user; boot(); } });
(async()=>{ const {data}=await sb.auth.getSession(); if(data.session){ USER=data.session.user; boot(); } })();

async function boot(){
  // profile
  let {data:prof}=await sb.from('profiles').select('*').eq('id',USER.id).maybeSingle();
  if(!prof){ await sb.from('profiles').insert({id:USER.id}); prof={id:USER.id,display_name:null}; }
  PROFILE=prof;
  // streak
  let {data:st}=await sb.from('streaks').select('*').eq('user_id',USER.id).maybeSingle();
  if(st) STREAK=st;
  // challenge
  let {data:uc}=await sb.from('user_challenge').select('*').eq('user_id',USER.id).maybeSingle();
  if(uc) chal={current_day:uc.current_day,completed_days:uc.completed_days||[]};
  // today done?
  let {data:ci}=await sb.from('checkins').select('id').eq('user_id',USER.id).eq('local_date',todayStr()).eq('source','today').maybeSingle();
  todayCompleted=!!ci;
  if(!PROFILE.display_name){ show('onb'); document.getElementById('nav').style.display='none'; }
  else { document.getElementById('nav').style.display='flex'; nav('today'); }
}
document.getElementById('onb-btn').onclick=async()=>{
  const name=document.getElementById('onb-name').value.trim()||'Friend';
  await sb.from('profiles').update({display_name:name}).eq('id',USER.id);
  PROFILE.display_name=name; document.getElementById('nav').style.display='flex'; nav('today');
};

// ---------- streak calc ----------
function computeStreak(){
  const t=todayStr();
  if(STREAK.last_date===t) return STREAK;
  let cur=1;
  if(STREAK.last_date){
    const d=(new Date(t)-new Date(STREAK.last_date))/86400000;
    cur = d===1 ? (STREAK.current+1) : 1;
  }
  return {current:cur,longest:Math.max(STREAK.longest||0,cur),last_date:t};
}

// ---------- TODAY ----------
function moodChip(m){return `<button class="chip ${m===todayMood?'sel':''}" onclick="todayPick('${m}')"><svg viewBox="0 0 24 24">${leafIcons[m]}</svg>${m}</button>`;}
function renderToday(){
  const hr=new Date().getHours(), g=hr<12?'Good morning':hr<18?'Good afternoon':'Good evening';
  let h=`<div class="header-row"><div><div class="h2">${g}, ${PROFILE.display_name}.</div><div class="sub">A quiet moment for today.</div></div>
    <div class="streak">🌿 ${STREAK.current||0}</div></div>`;
  if(todayCompleted){
    h+=`<div class="card center" style="margin-top:16px"><div style="font-size:30px">🌿</div><div class="h2">Today's moment is complete</div>
      <div class="sub" style="margin-top:6px">Come back tomorrow for a new one.</div></div>`;
    document.getElementById('s-today').innerHTML=h; return;
  }
  h+=`<div class="section-t">How are you feeling?</div><div class="chiprow">${moodList.map(moodChip).join('')}</div><div id="today-cards" style="margin-top:16px"></div>`;
  document.getElementById('s-today').innerHTML=h; renderTodayCards();
}
function renderTodayCards(){
  const w=document.getElementById('today-cards'); if(!w) return;
  if(!todayMood){ w.innerHTML=`<div class="card"><div class="sub">Pick how you're feeling to begin today's moment.</div></div>`; return; }
  const v=moods[todayMood];
  w.innerHTML=`<div class="card"><div class="label">${v.ref}</div><div class="verse">${v.text}</div><div class="divider"></div><div class="key"><b style="color:var(--text-primary)">Key:</b> ${v.key}</div></div>
    <div class="card"><div class="label">A prayer to begin</div><div class="prayer" style="margin-top:8px">${v.prayer}</div></div>
    <button class="btn btn-primary" onclick="openMoment('${todayMood}')">Begin Today's Grace Moment</button>`;
}
function todayPick(m){todayMood=m;renderToday();}

// ---------- MOMENT ----------
function openMoment(m){momentMood=m;momentStep=0;show('moment');renderMoment();}
function renderMoment(){
  const v=moods[momentMood], steps=4;
  let h=`<div class="step-head"><button class="back" onclick="momentBack()">‹</button><div class="progress-dots">${[0,1,2,3].map(i=>`<i class="${i<=momentStep?'on':''}"></i>`).join('')}</div><span class="label">${Math.min(momentStep+1,4)} of 4</span></div>`;
  if(momentStep===0){
    h+=`<div class="card"><div class="label">${v.ref}</div><div class="verse">${v.text}</div><div class="divider"></div><div class="key">${v.key}</div></div>
      <div class="card"><div class="label">A prayer to begin</div><div class="prayer" style="margin-top:8px">${v.prayer}</div></div>
      <button class="btn btn-primary" onclick="momentStep=1;renderMoment()">Continue</button>`;
  } else if(momentStep===1){
    h+=`<div class="reflect-q">${v.q}</div><textarea id="mo-ref" placeholder="Write a few words… (just for you)">${window._moRef||''}</textarea>
      <button class="btn btn-primary" style="margin-top:16px" onclick="saveRef();momentStep=2;renderMoment()">Continue</button>
      <button class="btn-text" onclick="momentStep=2;renderMoment()">Skip for now</button>`;
  } else if(momentStep===2){
    h+=`<div class="reflect-q">One small act of faith</div><div class="card"><div class="act" onclick="this.classList.toggle('done')"><span class="box"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></span><span class="prayer">${v.act}</span></div></div>
      <button class="btn btn-primary" onclick="completeMoment()">Complete Today</button>`;
  }
  document.getElementById('s-moment').innerHTML=h;
}
function saveRef(){const el=document.getElementById('mo-ref');if(el)window._moRef=el.value;}
function momentBack(){ if(momentStep>0){momentStep--;renderMoment();} else {show('today');} }
async function completeMoment(){
  const v=moods[momentMood], ns=computeStreak();
  await sb.from('checkins').insert({user_id:USER.id,local_date:todayStr(),mood:momentMood,verse_ref:v.ref,reflection:window._moRef||null,source:'today',completed:true});
  await sb.from('streaks').upsert({user_id:USER.id,current:ns.current,longest:ns.longest,last_date:ns.last_date});
  STREAK=ns; todayCompleted=true; window._moRef='';
  toast('Today complete 🌿  streak '+ns.current);
  show('today'); nav('today');
}

// ---------- JOURNEY ----------
async function renderJourney(){
  const {data:prayers}=await sb.from('prayer_requests').select('*').eq('user_id',USER.id).order('created_at',{ascending:false});
  const colors={praying:'#9BA895',waiting:'#AAB9BE',answered:'#6F8A68',changed:'#D5AAA4',archived:'#C9C2B6'};
  let h=`<div class="h1">Prayer Journey</div><div class="sub">Bring your requests here and watch how God moves.</div>
    <button class="btn btn-primary" style="margin-top:16px" onclick="newPrayer()">+ New prayer</button><div style="margin-top:16px">`;
  if(!prayers||!prayers.length){ h+=`<div class="card center"><div style="font-size:26px">🌿</div><div class="sub" style="margin-top:6px">No prayers yet. Add the first thing on your heart.</div></div>`; }
  else prayers.forEach(p=>{
    h+=`<button class="pr-card" onclick="openPrayer('${p.id}')"><div style="display:flex;justify-content:space-between;align-items:center"><b style="font-family:Fraunces,serif;font-size:17px">${esc(p.title)}</b>
      <span class="tag"><span class="dot" style="background:${colors[p.status]||'#ccc'}"></span>${p.status}</span></div>
      ${p.detail?`<div class="sub" style="margin-top:6px">${esc(p.detail).slice(0,90)}</div>`:''}
      <div class="small" style="margin-top:8px">${new Date(p.created_at).toLocaleDateString()}</div></button>`;
  });
  h+='</div>'; document.getElementById('s-journey').innerHTML=h;
}
function esc(s){return (s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
async function newPrayer(){
  const title=prompt('What would you like to pray about?'); if(!title) return;
  await sb.from('prayer_requests').insert({user_id:USER.id,title,status:'praying'});
  renderJourney();
}
async function openPrayer(id){
  const {data:p}=await sb.from('prayer_requests').select('*').eq('id',id).single();
  const {data:updates}=await sb.from('prayer_updates').select('*').eq('prayer_id',id).order('created_at',{ascending:true});
  const statuses=['praying','waiting','answered','changed','archived'];
  let h=`<div class="step-head"><button class="back" onclick="nav('journey')">‹</button><span class="label">Prayer</span></div>
    <div class="h2">${esc(p.title)}</div>
    <div style="margin:14px 0"><div class="label">Status</div>
      <select class="select" id="pr-status" onchange="setStatus('${id}',this.value)">${statuses.map(s=>`<option ${s===p.status?'selected':''}>${s}</option>`).join('')}</select></div>`;
  if(p.status==='answered'){ h+=`<div class="card"><div class="label">A moment worth remembering</div>
    <textarea id="pr-answer" placeholder="What changed? What did you learn? What are you grateful for?">${esc(p.answer_note||'')}</textarea>
    <button class="btn-text" style="text-align:left" onclick="saveAnswer('${id}')">Save reflection</button></div>`; }
  h+=`<div class="section-t">Updates</div>`;
  (updates||[]).forEach(u=>h+=`<div class="card"><div class="prayer">${esc(u.note)}</div><div class="small" style="margin-top:6px">${new Date(u.created_at).toLocaleDateString()}</div></div>`);
  h+=`<button class="btn btn-sec" onclick="addUpdate('${id}')">+ Add a note</button>`;
  document.getElementById('s-journey').innerHTML=h;
}
async function setStatus(id,s){ const patch={status:s}; if(s==='answered')patch.answered_at=new Date().toISOString(); await sb.from('prayer_requests').update(patch).eq('id',id); openPrayer(id); }
async function saveAnswer(id){ const t=document.getElementById('pr-answer').value; await sb.from('prayer_requests').update({answer_note:t}).eq('id',id); toast('Saved 🌿'); }
async function addUpdate(id){ const note=prompt('Add a note to this prayer:'); if(!note)return; await sb.from('prayer_updates').insert({prayer_id:id,user_id:USER.id,note}); openPrayer(id); }

// ---------- GRATITUDE ----------
async function renderGrat(){
  const {data:entries}=await sb.from('gratitude_entries').select('*').eq('user_id',USER.id).order('local_date',{ascending:false}).limit(60);
  const todayHas=(entries||[]).find(e=>e.local_date===todayStr());
  let h=`<div class="h1">Gratitude</div><div class="sub">Small thanks, gathered over time.</div>`;
  if(!todayHas){
    h+=`<div class="card" style="margin-top:16px"><div class="section-t" style="margin-top:0">Today, I'm grateful for…</div>
      <input type="text" id="g1" placeholder="One thing" style="margin-bottom:8px"/>
      <input type="text" id="g2" placeholder="Another (optional)" style="margin-bottom:8px"/>
      <input type="text" id="g3" placeholder="One more (optional)"/>
      <button class="btn btn-primary" style="margin-top:12px" onclick="saveGrat()">Save today's gratitude</button></div>`;
  } else {
    h+=`<div class="card" style="margin-top:16px"><div class="label">Today</div>${todayHas.items.map(i=>`<div class="prayer" style="margin-top:6px">🌿 ${esc(i)}</div>`).join('')}</div>`;
  }
  h+=`<div class="section-t">Your Grace Timeline</div>`;
  if(!entries||!entries.length){ h+=`<div class="sub">Your gratitude will gather here, day by day.</div>`; }
  else entries.forEach(e=>{ h+=`<div class="card"><div class="small">${new Date(e.local_date).toLocaleDateString(undefined,{month:'short',day:'numeric'})}</div>${e.items.map(i=>`<div class="prayer" style="margin-top:4px">🌿 ${esc(i)}</div>`).join('')}</div>`; });
  document.getElementById('s-grat').innerHTML=h;
}
async function saveGrat(){
  const items=['g1','g2','g3'].map(id=>document.getElementById(id).value.trim()).filter(Boolean);
  if(!items.length){toast('Add at least one thing 🌿');return;}
  await sb.from('gratitude_entries').insert({user_id:USER.id,local_date:todayStr(),items});
  toast('Saved 🌿'); renderGrat();
}

// ---------- CHALLENGE ----------
async function renderChal(){
  const d=chal.current_day;
  let h=`<div class="h1">7 Days of Peace</div><div class="sub">For a worried, weary heart.</div>
    <div class="leaves">${peace.map((_,i)=>leafSVG(i<d?'on':(i===d?'today':''))).join('')}</div>`;
  if(d>=7){
    h+=`<div class="card center"><div style="font-size:30px">🌿</div><div class="h2">You've completed 7 Days of Peace</div><div class="sub" style="margin-top:6px">Well done. Keep the quiet rhythm going.</div></div>`;
  } else {
    const day=peace[d];
    h+=`<div class="card"><div class="label">Day ${d+1} · ${day.theme}</div>
      <div class="verse" style="font-size:17px">${day.ref}</div>
      <div class="key" style="margin:8px 0">${day.q}</div>
      <div class="prayer" style="margin-bottom:12px">${day.prayer}</div>
      <div class="act" id="chal-act" onclick="this.classList.toggle('done')"><span class="box"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></span><span class="key">${day.act}</span></div>
      <button class="btn btn-primary" style="margin-top:16px" onclick="completeChalDay()">Complete Day ${d+1}</button></div>
      <div class="small">🔒 Day ${Math.min(d+2,7)} opens tomorrow</div>`;
  }
  document.getElementById('s-chal').innerHTML=h;
}
async function completeChalDay(){
  const nd=Math.min(chal.current_day+1,7);
  const done=[...(chal.completed_days||[]),chal.current_day+1];
  await sb.from('user_challenge').upsert({user_id:USER.id,current_day:nd,completed_days:done,completed_at:nd>=7?new Date().toISOString():null});
  chal.current_day=nd; chal.completed_days=done;
  // 챌린지 완료도 오늘 streak에 반영(오늘 아직 완료 안 했으면)
  if(!todayCompleted){ const ns=computeStreak(); await sb.from('streaks').upsert({user_id:USER.id,current:ns.current,longest:ns.longest,last_date:ns.last_date}); STREAK=ns; todayCompleted=true;
    await sb.from('checkins').insert({user_id:USER.id,local_date:todayStr(),source:'peace',peace_day:nd,completed:true}); }
  toast('Day complete 🌿'); renderChal();
}

// ---------- nav ----------
function nav(t){
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  show(t);
  if(t==='today')renderToday(); else if(t==='journey')renderJourney(); else if(t==='grat')renderGrat(); else if(t==='chal')renderChal();
}
window.todayPick=todayPick;window.openMoment=openMoment;window.momentBack=momentBack;window.completeMoment=completeMoment;
window.nav=nav;window.newPrayer=newPrayer;window.openPrayer=openPrayer;window.setStatus=setStatus;window.saveAnswer=saveAnswer;window.addUpdate=addUpdate;window.saveGrat=saveGrat;window.completeChalDay=completeChalDay;window.saveRef=saveRef;
</script>
</body>
</html>
